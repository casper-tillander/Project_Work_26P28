# prj.conf — Project 26P28 ML Pipeline

# FPU — critical for fast float inference on Cortex-M33
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Console output through SEGGER RTT, not UART
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Logging through RTT
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_DEFAULT_LEVEL=3

# Float formatting / printk support
CONFIG_CBPRINTF_FP_SUPPORT=y

# Timing API for latency measurement
CONFIG_TIMING_FUNCTIONS=y

# Math library
CONFIG_NEWLIB_LIBC=n
CONFIG_PICOLIBC=y

# Stack size — increase for large ANN weight matrices
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=8192